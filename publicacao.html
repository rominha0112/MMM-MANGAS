<script>
const radioVender = document.getElementById("Venderopcao");
const radioTrocar = document.getElementById("Trocaropcao");
const radioTrocarouvender=document.getElementById("Trocarouvenderopcao")
window.onload = function() {
  document.getElementById("Opcaovender").style.display = "none";
  document.getElementById("Opcaotrocar").style.display = "none";
  document.getElementById("Venderoutrocar").style.display= "none";
};

radioVender.addEventListener("change", function() {

  }
});

         document.getElementById("Venderoutrocar").style.display = "none";
         document.getElementById("Opcaotrocar").style.display = "block";
           
    }
   });
 
    radioTrocarouvender.addEventListener("change", function() {

         document.getElementById("Venderoutrocar").style.display = "block";
         document.getElementById("Opcaotrocar").style.display = "none";
         document.getElementById("Opcaovender").style.display = "none";    
    }
});

   preco.addEventListener("input", function() {
     {
     
     taxa = preco.value * 0.075
     botaoenvio1.value = "Enviar / Taxa R$" + taxa.toFixed(2)
      ;
     }
   });

  Preco3.addEventListener("input", function() {
      {
     
     taxa2 = preco2.value * 0.15
     botaoenvio3.value = "Enviar / Taxa R$" + taxa2.toFixed(2) ;

</script>
