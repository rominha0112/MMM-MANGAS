<!DOCTYPE html>
<link rel="stylesheet" href="Estilo.css/minhamae.css"/>
<html lang="pt-br">
<body class="Coringa">
<section>
<button onclick="window.history.back()" class="pano">⬅</button>
<h1 id="nome-contato"> Carregando...</h1>
</section>
<section id="chatu" class="chatu">
<form id="form">
<input type="text" id="msg" placeholder="sua mensagem"/>
<button type="submit">Enviar</button>
</form>
</section>


<script>
	const mensagi = document.getElementById("msg");
     const gpt = document.getElementById("chatu"); 
     const forms = document.getElementById("form"); 
	
	forms.addEventListener("submit", function (evento) {
     evento.preventDefault();

    const text = "Você:" + mensagi.value 

    if (text.trim() === "") return;

    const lamineyamal = document.createElement( "div" )
     lamineyamal.textContent = text ;
     
      gpt.appendChild(lamineyamal);

     mensagi.value = ""; 
    lamineyamal.classList.add('m')
});
</script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
const nomeDinamico = urlParams.get('nome');

if (nomeDinamico) {
    document.getElementById('nome-contato').innerText = nomeDinamico;
}
</script>
<script>
    function window.history.back () {}

    window.location.href="chat.html"
</script>

</body>
</html>
